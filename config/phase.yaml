# Quality posture configuration (§4.1)
# Each client starts at canva_baseline; upgrades governed by data thresholds.
quality_posture:
  canva_baseline:
    techniques:
      - self_refine
      - exemplar_injection
    contract_strictness: warn
    critique_rounds: 1
  enhanced:
    techniques:
      - self_refine
      - exemplar_injection
      - visual_brief_expansion
      - copy_formula_grounding
      - structured_critique
    contract_strictness: reject
    critique_rounds: 2
  full:
    techniques:
      - self_refine
      - exemplar_injection
      - visual_brief_expansion
      - copy_formula_grounding
      - structured_critique
      - parallel_guardrails
      - golden_dataset_calibration
    contract_strictness: reject
    critique_rounds: 3

# Model lock — Month 1-2, anti-drift #54
model_lock:
  text_model: gpt-5.4-mini
  scorer_model: gpt-5.4-mini
  guardrail_model: gpt-5.4-mini
  embedding_model: text-embedding-3-small
  image_models:
    - flux.2
    - kontext
    - nano-banana-pro
