# Age-Appropriate BM Vocabulary: Children Ages 5-7
# Word list aligned with KSSR Tahap 1 expectations.
# Used by children's book persona and tripwire scorer
# to verify text is within target vocabulary range.
#
# Categories follow typical children's book themes.
# Each word includes: word, meaning (EN), usage_note (optional).

