    usage_note: Water play, rain scenes

# Complexity guidelines for ages 5-7:
# - Sentences: 5-12 words per sentence
# - Paragraphs: 2-4 sentences per paragraph
# - Page word count: 20-50 words per spread
# - Syllable preference: 1-3 syllable words dominate
# - Compound words: introduce gradually (e.g., "matahari" is familiar)
# - Abstract concepts: only through concrete examples (sabar = waiting for turn)
