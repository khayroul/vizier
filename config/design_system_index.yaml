# Design System Index
# Tags all 55 web/UI design systems with structured attributes
# for deterministic selection. See architecture §38.1.1.
#
# Selection logic (~20 lines in contracts/routing.py):
#   1. Read client config industry + brand_mood
#   2. Read artifact type (poster -> moderate, landing page -> varies, document -> minimal)
#   3. Score each system via set intersection:
#      - Industry match: +2
#      - Mood match: +1
#      - Density match: +1
#      - Colour temperature match: +1
#   4. Return top 3 systems by score
#
# Attributes:
#   industry:           list of 1-5 tags
#   density:            minimal | moderate | dense
#   mood:               list of 1-3 tags
#   colour_temperature: warm | cool | neutral
#
# Industry tags: food, fashion, tech, education, corporate, retail, beauty,
#   healthcare, finance, energy, malaysia, general, automotive, luxury,
#   ecommerce, saas, creative, media, travel, real_estate, agriculture
#
# Mood tags: warm, cool, bold, elegant, playful, professional, premium,
#   energetic, clean, cinematic, emotional, traditional, modern, minimalist,
#   friendly, sophisticated, rugged, vibrant, calm, trustworthy

