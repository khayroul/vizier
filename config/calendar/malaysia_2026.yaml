# Malaysian Calendar and Events 2026
# ~50 events covering festive, commercial, school, state-level occasions.
# Morning brief checks this to surface upcoming events and suggest campaigns.
# See architecture §11.8.
#
# Fields:
#   name:                Event name
#   date:                Start date (YYYY-MM-DD)
#   end_date:            End date if multi-day (optional)
#   type:                festive | commercial | national | school | religious | state
#   prep_window_days:    Days before event to start campaign prep
#   industries_affected: Which industries should act on this event
#   content_themes:      Suggested content angles

