<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=794, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: {{ primary }};
      --accent: {{ accent }};
      --font-headline: '{{ font_headline }}', 'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif;
      --font-body: '{{ font_body }}', 'Inter', 'Helvetica Neue', Arial, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 794px;
      height: 1123px;
      overflow: hidden;
      font-family: var(--font-body);
      background: #fff;
      display: flex;
      flex-direction: column;
    }
    .top-section {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 72px 40px;
      text-align: center;
    }
    .inner {
      max-width: 560px;
    }
    {% if kicker %}
    .kicker {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: var(--accent);
      margin-bottom: 24px;
    }
    {% endif %}
    .headline {
      font-family: var(--font-headline);
      font-size: 52px;
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -2px;
      color: var(--primary);
      margin-bottom: 20px;
      text-wrap: balance;
    }
    .subheadline {
      font-size: 17px;
      font-weight: 400;
      line-height: 1.6;
      color: #666;
      margin-bottom: 36px;
    }
    .cta-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: #fff;
      font-family: var(--font-headline);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      padding: 16px 40px;
      border-radius: 60px;
      border: none;
    }
    .image-section {
      height: 460px;
      overflow: hidden;
      margin: 0 48px 48px;
      border-radius: 16px;
    }
    .image-section img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    {% if logo_url %}
    .logo {
      position: absolute;
      top: 32px;
      left: 32px;
      width: 44px;
      height: 44px;
      border-radius: 8px;
      object-fit: cover;
    }
    {% endif %}
  </style>
</head>
<body>
  {% if logo_url %}
  <img class="logo" src="{{ logo_url }}" alt="logo">
  {% endif %}
  <div class="top-section">
    <div class="inner">
      {% if kicker %}
      <div class="kicker">{{ kicker }}</div>
      {% endif %}
      {% if headline %}
      <div class="headline">{{ headline }}</div>
      {% endif %}
      {% if subheadline %}
      <div class="subheadline">{{ subheadline }}</div>
      {% endif %}
      {% if cta %}
      <div class="cta-button">{{ cta }} &rarr;</div>
      {% endif %}
    </div>
  </div>
  <div class="image-section">
    <img src="{{ background_image }}" alt="">
  </div>
</body>
</html>
