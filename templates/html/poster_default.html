<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=794, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: {{ primary }};
      --accent: {{ accent }};
      --font-headline: '{{ font_headline }}', 'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif;
      --font-body: '{{ font_body }}', 'Inter', 'Helvetica Neue', Arial, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 794px;
      height: 1123px;
      overflow: hidden;
      position: relative;
      font-family: var(--font-body);
      background: #0a0a12;
    }

    .bg-image {
      position: absolute;
      inset: 0;
      background-image: url('{{ background_image }}');
      background-size: cover;
      background-position: center;
    }

    .overlay-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(0,0,0,0.20) 0%,
        rgba(0,0,0,0.05) 25%,
        rgba(0,0,0,0.08) 45%,
        rgba(0,0,0,0.50) 70%,
        rgba(0,0,0,0.78) 88%,
        rgba(0,0,0,0.92) 100%
      );
    }

    .overlay-side {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(0,0,0,0.35) 0%, transparent 50%);
    }

    .grain {
      position: absolute;
      inset: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
      pointer-events: none;
    }

    .content-wrapper {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0 48px 48px;
      z-index: 2;
    }

    .accent-rule {
      width: 56px;
      height: 4px;
      background: var(--accent);
      border-radius: 2px;
      margin-bottom: 24px;
      box-shadow: 0 0 16px color-mix(in srgb, var(--accent) 45%, transparent);
    }

    .headline {
      font-family: var(--font-headline);
      font-size: 56px;
      font-weight: 800;
      line-height: 1.02;
      letter-spacing: -2px;
      color: #fff;
      text-wrap: balance;
      max-width: 640px;
      margin-bottom: 16px;
    }

    .subheadline {
      font-family: var(--font-headline);
      font-size: 20px;
      font-weight: 500;
      line-height: 1.4;
      color: rgba(255,255,255,0.82);
      max-width: 520px;
      margin-bottom: 28px;
    }

    .body-panel {
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 24px 28px;
      max-width: 520px;
      margin-bottom: 32px;
    }

    .body-panel ul { list-style: none; padding: 0; }

    .body-panel ul li {
      position: relative;
      font-size: 15px;
      font-weight: 400;
      line-height: 1.55;
      color: rgba(255,255,255,0.90);
      padding-left: 18px;
      margin-bottom: 9px;
    }

    .body-panel ul li:last-child { margin-bottom: 0; }

    .body-panel ul li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 8px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
    }

    .cta-button {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent);
      color: #fff;
      font-family: var(--font-headline);
      font-size: 17px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 18px 40px;
      border-radius: 60px;
      border: none;
      box-shadow:
        0 8px 24px color-mix(in srgb, var(--accent) 35%, transparent),
        0 2px 8px rgba(0,0,0,0.3);
    }

    .cta-button .arrow { font-size: 18px; margin-top: 1px; }

    {% if logo_url %}
    .top-badge {
      position: absolute;
      top: 40px;
      right: 40px;
      width: 72px;
      height: 72px;
      border: 2.5px solid rgba(255,255,255,0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      overflow: hidden;
    }

    .top-badge img {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      object-fit: cover;
    }
    {% endif %}
  </style>
</head>
<body>
  <div class="bg-image"></div>
  <div class="overlay-gradient"></div>
  <div class="overlay-side"></div>
  <div class="grain"></div>

  {% if logo_url %}
  <div class="top-badge">
    <img src="{{ logo_url }}" alt="logo">
  </div>
  {% endif %}

  <div class="content-wrapper">
    <div class="accent-rule"></div>

    {% if headline %}
    <div class="headline">{{ headline }}</div>
    {% endif %}

    {% if subheadline %}
    <div class="subheadline">{{ subheadline }}</div>
    {% endif %}

    {% if body_items %}
    <div class="body-panel">
      <ul>
        {% for item in body_items %}
        <li>{{ item }}</li>
        {% endfor %}
      </ul>
    </div>
    {% endif %}

    {% if cta %}
    <div class="cta-button">{{ cta }} <span class="arrow">&rarr;</span></div>
    {% endif %}
  </div>
</body>
</html>
