<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="reactor-width" content="1080">
  <meta name="reactor-height" content="1920">
  <meta name="reactor-slots" content="headline,body,cta,image_url,brand_name,logo_mark">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      background: var(--bg-color);
      position: relative;
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-weight: var(--font-body-weight, 400);
    }

    /* Hero image — low opacity, content is the star */
    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('{{image_url}}');
      background-size: cover;
      background-position: center;
      opacity: 0.2;
    }

    /* Radial vignette — transparent center, dark edges */
    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse 65% 55% at 50% 50%,
        transparent 0%,
        transparent 30%,
        rgba(0, 0, 0, 0.30) 58%,
        rgba(0, 0, 0, 0.80) 100%
      );
    }

    /* Noise texture — film grain depth */
    .noise {
      position: absolute;
      inset: 0;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
    }

    /* Full-canvas flex container — centers everything */
    .stage {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 120px 100px 140px;
    }

    /* Logo mark — centered circle, anchored at top */
    .logo-mark {
      width: 52px;
      height: 52px;
      border: 2px solid rgba(255, 255, 255, 0.85);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-headline), 'Arial Black', Impact, sans-serif;
      font-weight: var(--font-headline-weight, 900);
      font-size: 22px;
      color: #fff;
      letter-spacing: -0.5px;
      position: absolute;
      top: 120px;
      left: 50%;
      transform: translateX(-50%);
    }

    /* Center content column */
    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0;
    }

    /* Accent line — electric, centered entry point */
    .accent-line {
      width: 40px;
      height: 3px;
      background: var(--accent-color);
      margin-bottom: 36px;
      box-shadow: 0 0 16px color-mix(in srgb, var(--accent-color) 45%, transparent);
    }

    /* Headline — uppercase, tight, commanding */
    .headline {
      font-family: var(--font-headline), 'Arial Black', Impact, sans-serif;
      font-weight: var(--font-headline-weight, 900);
      font-size: 64px;
      color: #ffffff;
      text-transform: uppercase;
      line-height: 0.93;
      letter-spacing: -2px;
      margin-bottom: 32px;
      max-width: 760px;
    }

    /* Body — restrained, muted, readable */
    .body-text {
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-weight: var(--font-body-weight, 400);
      font-size: 24px;
      color: var(--text-muted);
      line-height: 1.55;
      letter-spacing: 0.2px;
      margin-bottom: 56px;
      max-width: 560px;
    }

    /* CTA — pill, accent fill, dark label */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent-color);
      color: var(--bg-color);
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-weight: 700;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      padding: 18px 44px;
      border-radius: 100px;
    }

    .cta-arrow {
      font-size: 17px;
      margin-top: 1px;
      letter-spacing: 0;
    }

    /* Brand whisper — well clear of safe zone, centered */
    .brand-whisper {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-weight: 700;
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 4.5px;
      white-space: nowrap;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="hero-bg"></div>
  <div class="vignette"></div>
  <div class="noise"></div>

  <div class="logo-mark">{{logo_mark}}</div>

  <div class="stage">
    <div class="content">
      <div class="accent-line"></div>
      <div class="headline">{{headline}}</div>
      <div class="body-text">{{body}}</div>
      <div class="cta-btn">{{cta}} <span class="cta-arrow">&rarr;</span></div>
    </div>
  </div>

  <div class="brand-whisper">{{brand_name}}</div>
</body>
</html>
