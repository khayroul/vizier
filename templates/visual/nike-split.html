<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="reactor-width" content="1080">
  <meta name="reactor-height" content="1080">
  <meta name="reactor-slots" content="headline,body,cta,image_url">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      display: flex;
      flex-direction: row;
    }
    .image-panel {
      width: 60%;
      height: 100%;
      overflow: hidden;
      position: relative;
    }
    .image-panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .accent-line {
      width: 2px;
      height: 100%;
      background: #CDFF00;
      flex-shrink: 0;
    }
    .text-panel {
      width: calc(40% - 2px);
      height: 100%;
      background: #111111;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 56px 40px;
    }
    .panel-top {
      display: flex;
      flex-direction: column;
    }
    .swoosh {
      width: 56px;
      height: 22px;
      background: white;
      clip-path: polygon(
        0% 70%, 15% 50%, 40% 40%, 70% 20%, 100% 0%,
        100% 15%, 65% 45%, 35% 60%, 10% 75%, 0% 85%
      );
      margin-bottom: 48px;
    }
    .headline {
      font-family: "Futura Condensed Extra Bold", "Arial Black", "Impact", sans-serif;
      font-size: 48px;
      font-weight: 900;
      color: #FFFFFF;
      text-transform: uppercase;
      line-height: 1.1;
      letter-spacing: -0.5px;
      margin-bottom: 20px;
    }
    .body-text {
      font-family: "Helvetica Neue", "Helvetica", "Arial", sans-serif;
      font-size: 22px;
      color: #999999;
      line-height: 1.4;
    }
    .cta-btn {
      display: inline-block;
      align-self: flex-start;
      background: #CDFF00;
      color: #111111;
      font-family: "Futura Condensed Extra Bold", "Arial Black", "Impact", sans-serif;
      font-size: 24px;
      font-weight: 900;
      text-transform: uppercase;
      padding: 16px 40px;
      border-radius: 36px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="image-panel">
    <img src="{{image_url}}" alt="Nike hero image">
  </div>
  <div class="accent-line"></div>
  <div class="text-panel">
    <div class="panel-top">
      <div class="swoosh"></div>
      <div class="headline">{{headline}}</div>
      <div class="body-text">{{body}}</div>
    </div>
    <div class="cta-btn">{{cta}}</div>
  </div>
</body>
</html>
