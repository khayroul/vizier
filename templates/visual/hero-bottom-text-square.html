<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="reactor-width" content="1080">
  <meta name="reactor-height" content="1080">
  <meta name="reactor-slots" content="headline,body,cta,image_url,brand_name,logo_mark">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background: var(--bg-color, #0a0a0f);
      position: relative;
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
    }

    /* Hero image — full bleed, high visibility */
    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('{{image_url}}');
      background-size: cover;
      background-position: center 40%;
      opacity: 0.75;
    }

    /* Gradient: reveal image at top, anchor text at bottom */
    .gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        175deg,
        color-mix(in srgb, var(--bg-color) 0%, transparent) 0%,
        color-mix(in srgb, var(--bg-color, #0a0a0f) 14%, transparent) 28%,
        color-mix(in srgb, var(--bg-color, #0a0a0f) 58%, transparent) 48%,
        color-mix(in srgb, var(--bg-color, #0a0a0f) 88%, transparent) 68%,
        var(--bg-color, #0a0a0f) 100%
      );
    }

    .focus-vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 24%, color-mix(in srgb, var(--accent-color, #e8c87a) 18%, transparent) 0%, transparent 26%),
        linear-gradient(180deg, transparent 0%, transparent 52%, rgba(0, 0, 0, 0.18) 72%, rgba(0, 0, 0, 0.3) 100%);
    }

    /* Subtle noise texture for depth */
    .noise {
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
    }

    /* Brand whisper — top-left, restrained */
    .brand-whisper {
      position: absolute;
      top: 56px;
      left: 64px;
      z-index: 3;
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-size: 11px;
      font-weight: var(--font-body-weight);
      color: rgba(255, 255, 255, 0.3);
      text-transform: uppercase;
      letter-spacing: 4px;
    }

    /* Logo mark — top-right, precise */
    .logo {
      position: absolute;
      top: 48px;
      right: 56px;
      z-index: 3;
      display: flex;
      align-items: center;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      border: 2.5px solid rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-headline), 'Arial Black', Impact, sans-serif;
      font-weight: var(--font-headline-weight);
      font-size: 18px;
      color: #fff;
      letter-spacing: -0.5px;
    }

    /* Content area — bottom third only */
    .content {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 760px;
      z-index: 2;
      padding: 28px 40px 56px 64px;
      border-top-right-radius: 34px;
      background: linear-gradient(
        180deg,
        color-mix(in srgb, var(--bg-color, #0a0a0f) 10%, transparent) 0%,
        color-mix(in srgb, var(--bg-color, #0a0a0f) 72%, transparent) 32%,
        color-mix(in srgb, var(--bg-color, #0a0a0f) 96%, transparent) 100%
      );
      box-shadow: 18px -10px 36px rgba(0, 0, 0, 0.16);
    }

    /* Accent line — thin, vivid, creates entry point */
    .accent-line {
      width: 54px;
      height: 3px;
      background: var(--accent-color, #e8c87a);
      margin-bottom: 24px;
      box-shadow: 0 0 14px color-mix(in srgb, var(--accent-color, #e8c87a) 34%, transparent);
    }

    /* Headline — BIG, tight, uppercase */
    .headline {
      font-family: var(--font-headline), 'Arial Black', Impact, sans-serif;
      font-size: 64px;
      font-weight: var(--font-headline-weight);
      color: var(--text-color, #ffffff);
      text-transform: uppercase;
      line-height: 0.95;
      letter-spacing: -2px;
      margin-bottom: 18px;
      max-width: 580px;
      text-wrap: balance;
    }

    /* Body — refined, restrained */
    .body-text {
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-size: 18px;
      font-weight: var(--font-body-weight);
      color: var(--text-muted, rgba(255, 255, 255, 0.72));
      line-height: 1.52;
      margin-bottom: 30px;
      max-width: 430px;
      letter-spacing: 0.2px;
    }

    /* CTA — pill, accent color, compact */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: var(--accent-color, #e8c87a);
      color: var(--bg-color, #0a0a0f);
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-size: 16px;
      font-weight: var(--font-headline-weight);
      text-transform: uppercase;
      padding: 16px 34px;
      border-radius: 100px;
      letter-spacing: 1.7px;
      border: 1px solid color-mix(in srgb, var(--bg-color, #0a0a0f) 28%, transparent);
      box-shadow: 0 18px 30px color-mix(in srgb, var(--accent-color, #e8c87a) 25%, transparent);
    }

    .cta-arrow {
      font-size: 16px;
      margin-top: 1px;
    }
  </style>
</head>
<body>
  <div class="hero-bg"></div>
  <div class="gradient"></div>
  <div class="focus-vignette"></div>
  <div class="noise"></div>

  <div class="brand-whisper">{{brand_name}}</div>

  <div class="logo">
    <div class="logo-mark">{{logo_mark}}</div>
  </div>

  <div class="content">
    <div class="accent-line"></div>
    <div class="headline">{{headline}}</div>
    <div class="body-text">{{body}}</div>
    <div class="cta-btn">{{cta}} <span class="cta-arrow">&rarr;</span></div>
  </div>
</body>
</html>
