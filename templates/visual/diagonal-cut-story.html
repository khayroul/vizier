<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="reactor-width" content="1080">
  <meta name="reactor-height" content="1920">
  <meta name="reactor-slots" content="headline,body,cta,image_url,brand_name,logo_mark">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      position: relative;
      background: var(--bg-color, #0a0a0f);
      font-family: var(--font-body, 'Helvetica Neue', Arial, sans-serif);
    }

    /* ── Image panel — top section, clipped with diagonal bottom edge ── */
    /* Diagonal: bottom-left at 55% height, bottom-right at 48% height */
    /* Points: top-left (0,0), top-right (100%,0), right at 48%, left at 55% */
    .image-panel {
      position: absolute;
      inset: 0;
      background-image: url('{{image_url}}');
      background-size: cover;
      background-position: center top;
      clip-path: polygon(0 0, 100% 0, 100% 48%, 0 55%);
    }

    /* Bottom fade on image */
    .image-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        transparent 55%,
        color-mix(in srgb, var(--bg-color, #0a0a0f) 80%, transparent) 90%,
        var(--bg-color, #0a0a0f) 100%
      );
    }

    /* ── Accent stripe along the diagonal edge ── */
    /* Diagonal runs from (0, 55%×1920) = (0, 1056) to (1080, 48%×1920) = (1080, 921.6) */
    /* Rise = 1056 - 921.6 = 134.4px over 1080px width → angle = -atan(134.4/1080) ≈ -7.1° (slopes down left-to-right) */
    .diagonal-stripe {
      position: absolute;
      top: 0;
      left: 0;
      width: 1080px;
      height: 1920px;
      pointer-events: none;
      z-index: 5;
    }

    .diagonal-stripe::before {
      content: '';
      position: absolute;
      top: 1053px;
      left: 0;
      width: 1170px; /* hypotenuse: sqrt(1080² + 134.4²) ≈ 1088, add buffer */
      height: 4px;
      background: var(--accent-color, #e8c87a);
      transform-origin: 0 0;
      transform: rotate(-7.1deg);
      box-shadow:
        0 0 8px color-mix(in srgb, var(--accent-color, #e8c87a) 70%, transparent),
        0 0 20px color-mix(in srgb, var(--accent-color, #e8c87a) 30%, transparent);
    }

    /* ── Text panel — bottom 45% ── */
    .text-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 48%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 80px 100px;
      background: var(--bg-color, #0a0a0f);
      z-index: 2;
    }

    /* ── Noise texture ── */
    .noise {
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
      pointer-events: none;
      z-index: 10;
    }

    /* ── Brand whisper — top left ── */
    .brand-whisper {
      position: absolute;
      top: 48px;
      left: 56px;
      font-family: var(--font-body, 'Helvetica Neue', Arial, sans-serif);
      font-size: 11px;
      color: rgba(255, 255, 255, 0.3);
      text-transform: uppercase;
      letter-spacing: 4px;
      z-index: 20;
    }

    /* ── Logo mark — top right ── */
    .logo-mark {
      position: absolute;
      top: 40px;
      right: 56px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2.5px solid rgba(255, 255, 255, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-headline, 'Georgia', serif);
      font-weight: var(--font-headline-weight, 700);
      font-size: 13px;
      color: var(--text-color, #ffffff);
      z-index: 20;
    }

    /* ── Content ── */
    .content-block {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Accent rule above headline */
    .accent-rule {
      width: 48px;
      height: 4px;
      background: var(--accent-color, #e8c87a);
      margin-bottom: 32px;
      box-shadow: 0 0 10px color-mix(in srgb, var(--accent-color, #e8c87a) 50%, transparent);
    }

    .headline {
      font-family: var(--font-headline, 'Georgia', serif);
      font-weight: var(--font-headline-weight, 700);
      font-size: 56px;
      color: var(--text-color, #ffffff);
      text-transform: uppercase;
      line-height: 0.93;
      letter-spacing: -1.5px;
      margin-bottom: 28px;
    }

    .body-text {
      font-family: var(--font-body, 'Helvetica Neue', Arial, sans-serif);
      font-weight: var(--font-body-weight, 400);
      font-size: 20px;
      color: var(--text-muted, rgba(255, 255, 255, 0.5));
      line-height: 1.6;
      margin-bottom: 52px;
    }

    /* ── CTA pill button ── */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--accent-color, #e8c87a);
      color: var(--bg-color, #0a0a0f);
      font-family: var(--font-body, 'Helvetica Neue', Arial, sans-serif);
      font-weight: 700;
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border-radius: 100px;
      padding: 14px 32px;
      align-self: flex-start;
    }
  </style>
</head>
<body>

  <div class="noise"></div>
  <div class="brand-whisper">{{brand_name}}</div>
  <div class="logo-mark">{{logo_mark}}</div>

  <div class="image-panel"></div>
  <div class="diagonal-stripe"></div>

  <div class="text-panel">
    <div class="content-block">
      <div class="accent-rule"></div>
      <div class="headline">{{headline}}</div>
      <div class="body-text">{{body}}</div>
      <div class="cta-btn">{{cta}} &rarr;</div>
    </div>
  </div>

</body>
</html>
