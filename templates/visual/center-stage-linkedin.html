<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="reactor-width" content="1200">
  <meta name="reactor-height" content="627">
  <meta name="reactor-slots" content="headline,body,cta,image_url,brand_name,logo_mark">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 627px;
      overflow: hidden;
      background: var(--bg-color);
      position: relative;
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-weight: var(--font-body-weight, 400);
    }

    .bg-image {
      position: absolute;
      inset: 0;
      background-image: url('{{image_url}}');
      background-size: cover;
      background-position: center;
      filter: brightness(0.35);
    }

    .noise {
      position: absolute;
      inset: 0;
      opacity: 0.05;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
      pointer-events: none;
    }

    .logo-mark {
      position: absolute;
      top: 32px;
      left: 48px;
      width: 36px;
      height: 36px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-headline), 'Arial Black', Impact, sans-serif;
      font-weight: var(--font-headline-weight, 900);
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      z-index: 10;
    }

    .stage {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 80px;
    }

    .accent-line {
      width: 48px;
      height: 3px;
      background: var(--accent-color);
      margin-bottom: 24px;
      box-shadow: 0 0 14px color-mix(in srgb, var(--accent-color) 50%, transparent);
    }

    .headline {
      font-family: var(--font-headline), 'Arial Black', Impact, sans-serif;
      font-weight: var(--font-headline-weight, 900);
      font-size: 56px;
      color: #ffffff;
      line-height: 1.05;
      letter-spacing: -1.5px;
      text-transform: uppercase;
      max-width: 900px;
      margin-bottom: 20px;
    }

    .body-text {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.55;
      max-width: 600px;
      margin-bottom: 28px;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: var(--accent-color);
      color: var(--bg-color);
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 12px 26px;
      border-radius: 100px;
    }

    .cta-arrow {
      font-size: 13px;
      letter-spacing: 0;
      margin-top: 1px;
    }

    .brand-whisper {
      position: absolute;
      bottom: 24px;
      right: 48px;
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-weight: 700;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.3);
      text-transform: uppercase;
      letter-spacing: 4px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="bg-image"></div>
  <div class="noise"></div>

  <div class="logo-mark">{{logo_mark}}</div>

  <div class="stage">
    <div class="accent-line"></div>
    <div class="headline">{{headline}}</div>
    <div class="body-text">{{body}}</div>
    <div class="cta-btn">{{cta}} <span class="cta-arrow">&rarr;</span></div>
  </div>

  <div class="brand-whisper">{{brand_name}}</div>
</body>
</html>
