<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="reactor-width" content="1080">
  <meta name="reactor-height" content="1920">
  <meta name="reactor-slots" content="headline,body,cta,brand_name,logo_mark">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      background: var(--bg-color);
      position: relative;
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-weight: var(--font-body-weight, 400);
    }

    /* Solid background — pure typography, no hero image */
    .bg-solid {
      position: absolute;
      inset: 0;
      background: var(--bg-color);
    }

    /* Noise texture — film grain on the solid bg */
    .noise {
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
      pointer-events: none;
    }

    /* Accent geometric — large translucent circle, top-right for story format */
    .accent-orb {
      position: absolute;
      top: -300px;
      right: -300px;
      width: 900px;
      height: 900px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--accent-color) 10%, transparent);
      pointer-events: none;
      z-index: 1;
    }

    /* Brand whisper — top-left */
    .brand-whisper {
      position: absolute;
      top: 72px;
      left: 88px;
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-weight: 700;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.3);
      text-transform: uppercase;
      letter-spacing: 4px;
      z-index: 10;
    }

    /* Logo mark — top-right, 36px circle with 2.5px white border */
    .logo-mark {
      position: absolute;
      top: 64px;
      right: 88px;
      width: 36px;
      height: 36px;
      border: 2.5px solid rgba(255, 255, 255, 1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-headline), 'Arial Black', Impact, sans-serif;
      font-weight: var(--font-headline-weight, 900);
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: -0.5px;
      z-index: 10;
    }

    /* Main stage — headline centered in the middle third */
    .stage {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      /* Middle third: from ~33% to ~67% of 1920px */
      bottom: 640px;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 180px 88px 0;
    }

    /* MASSIVE stacked headline — dominant, fills the tall canvas */
    .headline {
      font-family: var(--font-headline), 'Arial Black', Impact, sans-serif;
      font-weight: var(--font-headline-weight, 900);
      font-size: 140px;
      text-transform: uppercase;
      line-height: 0.85;
      letter-spacing: -4px;
      color: var(--text-color);
      max-width: 904px;
    }

    /* Bottom quarter — body + CTA */
    .bottom-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 480px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 0 88px 100px;
      z-index: 3;
    }

    /* Accent line */
    .accent-line {
      width: 48px;
      height: 3px;
      background: var(--accent-color);
      margin-bottom: 28px;
      box-shadow: 0 0 16px color-mix(in srgb, var(--accent-color) 50%, transparent);
      flex-shrink: 0;
    }

    /* Body text — slightly larger for the tall canvas */
    .body-text {
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-weight: var(--font-body-weight, 400);
      font-size: 20px;
      color: var(--text-muted);
      line-height: 1.6;
      letter-spacing: 0.1px;
      max-width: 500px;
      margin-bottom: 44px;
    }

    /* CTA pill button — accent bg, bg-color text */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent-color);
      color: var(--bg-color);
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 17px 38px;
      border-radius: 100px;
    }

    .cta-arrow {
      font-size: 15px;
      letter-spacing: 0;
      margin-top: 1px;
    }
  </style>
</head>
<body>
  <div class="bg-solid"></div>
  <div class="noise"></div>
  <div class="accent-orb"></div>

  <div class="brand-whisper">{{brand_name}}</div>
  <div class="logo-mark">{{logo_mark}}</div>

  <div class="stage">
    <div class="headline">{{headline}}</div>
  </div>

  <div class="bottom-panel">
    <div class="accent-line"></div>
    <div class="body-text">{{body}}</div>
    <div class="cta-btn">{{cta}} <span class="cta-arrow">&rarr;</span></div>
  </div>
</body>
</html>
