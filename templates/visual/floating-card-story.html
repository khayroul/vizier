<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="reactor-width" content="1080">
  <meta name="reactor-height" content="1920">
  <meta name="reactor-slots" content="headline,body,cta,image_url,brand_name,logo_mark">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      background: var(--bg-color);
      position: relative;
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
    }

    /* Noise texture for depth */
    .noise {
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
      pointer-events: none;
      z-index: 10;
    }

    /* Brand whisper — top-left */
    .brand-whisper {
      position: absolute;
      top: 80px;
      left: 80px;
      z-index: 5;
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-size: 11px;
      font-weight: var(--font-body-weight);
      color: rgba(255, 255, 255, 0.3);
      text-transform: uppercase;
      letter-spacing: 4px;
    }

    /* Logo mark — top-right */
    .logo {
      position: absolute;
      top: 68px;
      right: 80px;
      z-index: 5;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      border: 2.5px solid rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-headline), 'Arial Black', Impact, sans-serif;
      font-weight: var(--font-headline-weight);
      font-size: 18px;
      color: #fff;
      letter-spacing: -0.5px;
    }

    /* Floating hero card */
    .card {
      position: absolute;
      top: 160px;
      left: 50%;
      transform: translateX(-50%);
      width: 920px;
      height: 800px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
      border: 2px solid color-mix(in srgb, var(--accent-color) 20%, transparent);
      z-index: 2;
    }

    .card-image {
      width: 100%;
      height: 100%;
      background-image: url('{{image_url}}');
      background-size: cover;
      background-position: center;
    }

    /* Text content below card */
    .content {
      position: absolute;
      top: 1020px;
      left: 50%;
      transform: translateX(-50%);
      width: 920px;
      z-index: 3;
    }

    /* Accent line */
    .accent-line {
      width: 40px;
      height: 3px;
      background: var(--accent-color);
      margin-bottom: 32px;
      box-shadow: 0 0 12px color-mix(in srgb, var(--accent-color) 30%, transparent);
    }

    /* Headline */
    .headline {
      font-family: var(--font-headline), 'Arial Black', Impact, sans-serif;
      font-size: 52px;
      font-weight: var(--font-headline-weight);
      color: var(--text-color);
      line-height: 1.05;
      letter-spacing: -1.5px;
      margin-bottom: 24px;
      max-width: 820px;
    }

    /* Body text */
    .body-text {
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-size: 22px;
      font-weight: var(--font-body-weight);
      color: var(--text-muted);
      line-height: 1.55;
      margin-bottom: 48px;
      max-width: 680px;
      letter-spacing: 0.2px;
    }

    /* CTA pill */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent-color);
      color: var(--bg-color);
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-size: 15px;
      font-weight: var(--font-headline-weight);
      text-transform: uppercase;
      padding: 14px 32px;
      border-radius: 100px;
      letter-spacing: 1.5px;
    }

    .cta-arrow {
      font-size: 16px;
      margin-top: 1px;
    }
  </style>
</head>
<body>
  <div class="noise"></div>

  <div class="brand-whisper">{{brand_name}}</div>

  <div class="logo">
    <div class="logo-mark">{{logo_mark}}</div>
  </div>

  <div class="card">
    <div class="card-image"></div>
  </div>

  <div class="content">
    <div class="accent-line"></div>
    <div class="headline">{{headline}}</div>
    <div class="body-text">{{body}}</div>
    <div class="cta-btn">{{cta}} <span class="cta-arrow">&rarr;</span></div>
  </div>
</body>
</html>
