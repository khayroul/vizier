<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="reactor-width" content="1080">
  <meta name="reactor-height" content="1080">
  <meta name="reactor-slots" content="headline,body,cta,image_url,brand_name,logo_mark">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 0%, color-mix(in srgb, var(--accent-color, #e8c87a) 14%, transparent) 0%, transparent 42%),
        var(--bg-color, #0a0a0f);
      position: relative;
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
    }

    /* Noise texture for depth */
    .noise {
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
      pointer-events: none;
      z-index: 10;
    }

    /* Brand whisper — top-left */
    .brand-whisper {
      position: absolute;
      top: 56px;
      left: 90px;
      z-index: 5;
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-size: 11px;
      font-weight: var(--font-body-weight);
      color: rgba(255, 255, 255, 0.3);
      text-transform: uppercase;
      letter-spacing: 4px;
    }

    /* Logo mark — top-right */
    .logo {
      position: absolute;
      top: 44px;
      right: 80px;
      z-index: 5;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      border: 2.5px solid rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-headline), 'Arial Black', Impact, sans-serif;
      font-weight: var(--font-headline-weight);
      font-size: 18px;
      color: #fff;
      letter-spacing: -0.5px;
    }

    /* Floating hero card */
    .card {
      position: absolute;
      top: 88px;
      left: 50%;
      transform: translateX(-50%);
      width: 920px;
      height: 470px;
      border-radius: 26px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(255, 255, 255, 0.06);
      border: 2px solid color-mix(in srgb, var(--accent-color, #e8c87a) 22%, transparent);
      z-index: 2;
    }

    .card-image {
      width: 100%;
      height: 100%;
      background-image: url('{{image_url}}');
      background-size: cover;
      background-position: center;
      filter: saturate(1.08) contrast(1.04);
    }

    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.05) 0%, rgba(0, 0, 0, 0.28) 100%),
        radial-gradient(circle at 22% 18%, color-mix(in srgb, var(--accent-color, #e8c87a) 18%, transparent) 0%, transparent 38%);
    }

    /* Text content below card */
    .content {
      position: absolute;
      top: 582px;
      left: 50%;
      transform: translateX(-50%);
      width: 920px;
      z-index: 3;
      padding: 34px 38px 40px;
      border-radius: 28px;
      background: color-mix(in srgb, var(--bg-color, #0a0a0f) 82%, rgba(255, 255, 255, 0.08));
      border: 1px solid color-mix(in srgb, var(--text-color, #ffffff) 8%, transparent);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.28);
    }

    /* Accent line */
    .accent-line {
      width: 58px;
      height: 3px;
      background: var(--accent-color, #e8c87a);
      margin-bottom: 24px;
      box-shadow: 0 0 14px color-mix(in srgb, var(--accent-color, #e8c87a) 34%, transparent);
    }

    /* Headline */
    .headline {
      font-family: var(--font-headline), 'Arial Black', Impact, sans-serif;
      font-size: 48px;
      font-weight: var(--font-headline-weight);
      color: var(--text-color, #ffffff);
      line-height: 0.98;
      letter-spacing: -1.5px;
      margin-bottom: 14px;
      max-width: 760px;
    }

    /* Body text */
    .body-text {
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-size: 18px;
      font-weight: var(--font-body-weight);
      color: var(--text-muted, rgba(255, 255, 255, 0.72));
      line-height: 1.55;
      margin-bottom: 28px;
      max-width: 560px;
      letter-spacing: 0.2px;
    }

    /* CTA pill */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent-color, #e8c87a);
      color: var(--bg-color, #0a0a0f);
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-size: 16px;
      font-weight: var(--font-headline-weight);
      text-transform: uppercase;
      letter-spacing: 1.7px;
      padding: 16px 34px;
      min-width: 210px;
      justify-content: center;
      border-radius: 100px;
      border: 1px solid color-mix(in srgb, var(--bg-color, #0a0a0f) 30%, transparent);
      box-shadow: 0 16px 28px color-mix(in srgb, var(--accent-color, #e8c87a) 26%, transparent);
    }

    .cta-arrow {
      font-size: 16px;
      margin-top: 1px;
    }
  </style>
</head>
<body>
  <div class="noise"></div>

  <div class="brand-whisper">{{brand_name}}</div>

  <div class="logo">
    <div class="logo-mark">{{logo_mark}}</div>
  </div>

  <div class="card">
    <div class="card-image"></div>
  </div>

  <div class="content">
    <div class="accent-line"></div>
    <div class="headline">{{headline}}</div>
    <div class="body-text">{{body}}</div>
    <div class="cta-btn">{{cta}} <span class="cta-arrow">&rarr;</span></div>
  </div>
</body>
</html>
