<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="reactor-width" content="1080">
  <meta name="reactor-height" content="1080">
  <meta name="reactor-slots" content="headline,body,cta,image_url">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 58% 42%;
      background: #08080C;
      font-family: 'Space Grotesk', sans-serif;
      position: relative;
    }

    /* ── Image panel ── */
    .image-panel {
      position: relative;
      overflow: hidden;
    }
    .image-panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    /* Subtle vignette on image edges */
    .image-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        rgba(8, 8, 12, 0.0) 70%,
        rgba(8, 8, 12, 0.4) 95%,
        rgba(8, 8, 12, 1.0) 100%
      );
      pointer-events: none;
    }

    /* ── Accent divider — vertical electric line ── */
    .divider {
      position: absolute;
      left: 58%;
      top: 0;
      bottom: 0;
      width: 1px;
      z-index: 2;
    }
    .divider-line {
      position: absolute;
      top: 15%;
      bottom: 15%;
      width: 1px;
      background: linear-gradient(
        180deg,
        transparent 0%,
        #00D4FF 20%,
        #00D4FF 80%,
        transparent 100%
      );
      box-shadow: 0 0 8px rgba(0, 212, 255, 0.25);
    }

    /* ── Text panel ── */
    .text-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 72px 56px 72px 48px;
      position: relative;
    }

    /* Noise overlay for texture */
    .text-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
      pointer-events: none;
    }

    /* Logo — circled V, top of text panel */
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 56px;
    }
    .logo-mark {
      width: 32px;
      height: 32px;
      border: 2px solid rgba(255, 255, 255, 0.7);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 16px;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.3);
      text-transform: uppercase;
      letter-spacing: 3.5px;
    }

    /* Accent dot */
    .accent-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00D4FF;
      margin-bottom: 28px;
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.35);
    }

    /* Headline */
    .headline {
      font-family: 'Outfit', sans-serif;
      font-size: 52px;
      font-weight: 900;
      color: #FFFFFF;
      text-transform: uppercase;
      line-height: 0.95;
      letter-spacing: -1.5px;
      margin-bottom: 20px;
    }

    /* Body */
    .body-text {
      font-size: 17px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.45);
      line-height: 1.5;
      margin-bottom: 48px;
      letter-spacing: 0.2px;
    }

    /* CTA */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      align-self: flex-start;
      gap: 8px;
      background: transparent;
      color: #00D4FF;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 14px 0;
      border-bottom: 1.5px solid rgba(0, 212, 255, 0.5);
    }
    .cta-arrow {
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="image-panel">
    <img src="{{image_url}}" alt="Velos product hero">
  </div>

  <div class="divider">
    <div class="divider-line"></div>
  </div>

  <div class="text-panel">
    <div class="logo">
      <div class="logo-mark">V</div>
      <span class="logo-text">Velos</span>
    </div>
    <div class="accent-dot"></div>
    <div class="headline">{{headline}}</div>
    <div class="body-text">{{body}}</div>
    <div class="cta-btn">{{cta}} <span class="cta-arrow">&rarr;</span></div>
  </div>
</body>
</html>
