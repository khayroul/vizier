<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="reactor-width" content="1080">
  <meta name="reactor-height" content="1080">
  <meta name="reactor-slots" content="headline,body,cta,image_url">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background: #08080C;
      position: relative;
      font-family: 'Space Grotesk', sans-serif;
    }

    /* Hero image — THE STAR. Full bleed, high visibility */
    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('{{image_url}}');
      background-size: cover;
      background-position: center 40%;
      opacity: 0.75;
    }

    /* Gradient: reveal product at top, anchor text at bottom */
    .gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        175deg,
        rgba(8, 8, 12, 0.0) 0%,
        rgba(8, 8, 12, 0.15) 35%,
        rgba(8, 8, 12, 0.75) 60%,
        rgba(8, 8, 12, 0.95) 80%,
        rgba(8, 8, 12, 1.0) 100%
      );
    }

    /* Subtle noise texture for depth */
    .noise {
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
    }

    /* Logo mark — small, precise, top-right */
    .logo {
      position: absolute;
      top: 48px;
      right: 56px;
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-mark {
      width: 36px;
      height: 36px;
      border: 2.5px solid rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 18px;
      color: #fff;
      letter-spacing: -0.5px;
    }

    /* Content area — bottom third only */
    .content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 2;
      padding: 0 64px 64px;
    }

    /* Accent line — thin, electric, creates entry point */
    .accent-line {
      width: 40px;
      height: 3px;
      background: #00D4FF;
      margin-bottom: 24px;
      box-shadow: 0 0 12px rgba(0, 212, 255, 0.3);
    }

    /* Headline — BIG, tight, uppercase */
    .headline {
      font-family: 'Outfit', sans-serif;
      font-size: 64px;
      font-weight: 900;
      color: #FFFFFF;
      text-transform: uppercase;
      line-height: 0.95;
      letter-spacing: -2px;
      margin-bottom: 18px;
      max-width: 600px;
    }

    /* Body — refined, restrained, grey */
    .body-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.55);
      line-height: 1.45;
      margin-bottom: 36px;
      max-width: 440px;
      letter-spacing: 0.2px;
    }

    /* CTA — pill, accent color, compact */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #00D4FF;
      color: #08080C;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 14px 32px;
      border-radius: 100px;
      letter-spacing: 1.5px;
    }
    .cta-arrow {
      font-size: 16px;
      margin-top: 1px;
    }

    /* Top-left brand whisper */
    .brand-whisper {
      position: absolute;
      top: 56px;
      left: 64px;
      z-index: 3;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.3);
      text-transform: uppercase;
      letter-spacing: 4px;
    }
  </style>
</head>
<body>
  <div class="hero-bg"></div>
  <div class="gradient"></div>
  <div class="noise"></div>

  <div class="brand-whisper">Velos Athletics</div>

  <div class="logo">
    <div class="logo-mark">V</div>
  </div>

  <div class="content">
    <div class="accent-line"></div>
    <div class="headline">{{headline}}</div>
    <div class="body-text">{{body}}</div>
    <div class="cta-btn">{{cta}} <span class="cta-arrow">&rarr;</span></div>
  </div>
</body>
</html>
