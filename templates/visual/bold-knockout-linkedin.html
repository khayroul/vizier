<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="reactor-width" content="1200">
  <meta name="reactor-height" content="627">
  <meta name="reactor-slots" content="headline,body,cta,image_url,brand_name,logo_mark">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 627px;
      overflow: hidden;
      background: var(--bg-color);
      position: relative;
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-weight: var(--font-body-weight, 400);
    }

    .bg-solid {
      position: absolute;
      inset: 0;
      background: var(--bg-color);
    }

    .noise {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
      pointer-events: none;
    }

    .logo-mark {
      position: absolute;
      top: 36px;
      right: 48px;
      width: 36px;
      height: 36px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-headline), 'Arial Black', Impact, sans-serif;
      font-weight: var(--font-headline-weight, 900);
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: -0.5px;
      z-index: 10;
    }

    .stage {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: row;
      align-items: stretch;
    }

    .left-col {
      flex: 0 0 600px;
      display: flex;
      align-items: center;
      padding: 44px 36px 44px 60px;
    }

    .knockout-text {
      font-family: var(--font-headline), 'Arial Black', Impact, sans-serif;
      font-weight: var(--font-headline-weight, 900);
      font-size: 96px;
      text-transform: uppercase;
      line-height: 0.88;
      letter-spacing: -2.5px;
      color: transparent;
      background-image: url('{{image_url}}');
      background-size: 1200px 627px;
      background-position: left center;
      -webkit-background-clip: text;
      background-clip: text;
      filter: brightness(1.1) contrast(1.05);
      max-width: 500px;
    }

    .divider {
      flex: 0 0 2px;
      background: color-mix(in srgb, var(--accent-color) 25%, transparent);
      margin: 60px 0;
      align-self: stretch;
    }

    .right-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 44px 48px;
    }

    .accent-line {
      width: 40px;
      height: 3px;
      background: var(--accent-color);
      margin-bottom: 20px;
      box-shadow: 0 0 14px color-mix(in srgb, var(--accent-color) 50%, transparent);
      flex-shrink: 0;
    }

    .body-text {
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-weight: var(--font-body-weight, 400);
      font-size: 16px;
      color: var(--text-muted);
      line-height: 1.55;
      letter-spacing: 0.1px;
      max-width: 360px;
      margin-bottom: 28px;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: var(--accent-color);
      color: var(--bg-color);
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 12px 26px;
      border-radius: 100px;
    }

    .cta-arrow {
      font-size: 13px;
      letter-spacing: 0;
      margin-top: 1px;
    }

    .brand-whisper {
      position: absolute;
      bottom: 28px;
      right: 48px;
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-weight: 700;
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 4px;
      opacity: 0.4;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="bg-solid"></div>
  <div class="noise"></div>

  <div class="logo-mark">{{logo_mark}}</div>

  <div class="stage">
    <div class="left-col">
      <div class="knockout-text">{{headline}}</div>
    </div>
    <div class="divider"></div>
    <div class="right-col">
      <div class="accent-line"></div>
      <div class="body-text">{{body}}</div>
      <div class="cta-btn">{{cta}} <span class="cta-arrow">&rarr;</span></div>
    </div>
  </div>

  <div class="brand-whisper">{{brand_name}}</div>
</body>
</html>
