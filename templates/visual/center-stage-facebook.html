<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="reactor-width" content="1200">
  <meta name="reactor-height" content="630">
  <meta name="reactor-slots" content="headline,body,cta,image_url,brand_name,logo_mark">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: var(--bg-color);
      position: relative;
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-weight: var(--font-body-weight, 400);
    }

    /* Hero image — low opacity, content is the star */
    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('{{image_url}}');
      background-size: cover;
      background-position: center;
      opacity: 0.2;
    }

    /* Radial vignette — transparent center, dark edges
       Wider ellipse to match landscape aspect ratio */
    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse 75% 80% at 50% 50%,
        transparent 0%,
        transparent 30%,
        rgba(0, 0, 0, 0.32) 60%,
        rgba(0, 0, 0, 0.78) 100%
      );
    }

    /* Noise texture — film grain depth */
    .noise {
      position: absolute;
      inset: 0;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
    }

    /* Top row — logo mark + brand whisper share the same line */
    .top-row {
      position: absolute;
      top: 36px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 34px;
      height: 34px;
      border: 2px solid rgba(255, 255, 255, 0.82);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-headline), 'Arial Black', Impact, sans-serif;
      font-weight: var(--font-headline-weight, 900);
      font-size: 15px;
      color: #fff;
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }

    .brand-whisper {
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-weight: 700;
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 3.5px;
      white-space: nowrap;
      opacity: 0.55;
    }

    /* Full-canvas flex container — centers everything */
    .stage {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 120px 56px;
    }

    /* Center content column — compact vertical rhythm */
    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0;
    }

    /* Accent line */
    .accent-line {
      width: 40px;
      height: 3px;
      background: var(--accent-color);
      margin-bottom: 20px;
      box-shadow: 0 0 12px color-mix(in srgb, var(--accent-color) 40%, transparent);
    }

    /* Headline — compact for landscape */
    .headline {
      font-family: var(--font-headline), 'Arial Black', Impact, sans-serif;
      font-weight: var(--font-headline-weight, 900);
      font-size: 44px;
      color: #ffffff;
      text-transform: uppercase;
      line-height: 0.95;
      letter-spacing: -1px;
      margin-bottom: 16px;
      max-width: 760px;
    }

    /* Body — tight for the compact format */
    .body-text {
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-weight: var(--font-body-weight, 400);
      font-size: 17px;
      color: var(--text-muted);
      line-height: 1.45;
      letter-spacing: 0.2px;
      margin-bottom: 28px;
      max-width: 560px;
    }

    /* CTA — smaller padding for the compact format */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent-color);
      color: var(--bg-color);
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      padding: 12px 28px;
      border-radius: 100px;
    }

    .cta-arrow {
      font-size: 13px;
      margin-top: 1px;
      letter-spacing: 0;
    }
  </style>
</head>
<body>
  <div class="hero-bg"></div>
  <div class="vignette"></div>
  <div class="noise"></div>

  <div class="top-row">
    <div class="logo-mark">{{logo_mark}}</div>
    <div class="brand-whisper">{{brand_name}}</div>
  </div>

  <div class="stage">
    <div class="content">
      <div class="accent-line"></div>
      <div class="headline">{{headline}}</div>
      <div class="body-text">{{body}}</div>
      <div class="cta-btn">{{cta}} <span class="cta-arrow">&rarr;</span></div>
    </div>
  </div>
</body>
</html>
