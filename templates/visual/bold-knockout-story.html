<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="reactor-width" content="1080">
  <meta name="reactor-height" content="1920">
  <meta name="reactor-slots" content="headline,body,cta,image_url,brand_name,logo_mark">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      background: var(--bg-color);
      position: relative;
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-weight: var(--font-body-weight, 400);
    }

    /* Solid background — the stage. Image only bleeds through the text. */
    .bg-solid {
      position: absolute;
      inset: 0;
      background: var(--bg-color);
    }

    /* Noise texture — film grain on the solid bg */
    .noise {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
      pointer-events: none;
    }

    /* Logo mark — top-center for story format */
    .logo-mark {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 48px;
      height: 48px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-headline), 'Arial Black', Impact, sans-serif;
      font-weight: var(--font-headline-weight, 900);
      font-size: 18px;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: -0.5px;
      z-index: 10;
    }

    /* Main layout — vertically centered in the tall canvas */
    .stage {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 0 88px;
    }

    /* THE KNOCKOUT HEADLINE — image shows through the letterforms */
    .knockout-text {
      font-family: var(--font-headline), 'Arial Black', Impact, sans-serif;
      font-weight: var(--font-headline-weight, 900);
      font-size: 160px;
      text-transform: uppercase;
      line-height: 0.88;
      letter-spacing: -4px;
      color: transparent;
      background-image: url('{{image_url}}');
      background-size: cover;
      background-position: center;
      -webkit-background-clip: text;
      background-clip: text;
      filter: brightness(1.1) contrast(1.05);
      max-width: 904px;
      /* Push headline slightly above true center for visual balance */
      margin-top: -120px;
      margin-bottom: 0;
    }

    /* Bottom panel — body + CTA anchored to bottom 25% */
    .bottom-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 480px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 0 88px 80px;
      z-index: 3;
    }

    /* Accent line — between headline zone and body zone */
    .accent-line {
      width: 48px;
      height: 3px;
      background: var(--accent-color);
      margin-bottom: 28px;
      box-shadow: 0 0 16px color-mix(in srgb, var(--accent-color) 50%, transparent);
      flex-shrink: 0;
    }

    /* Body text */
    .body-text {
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-weight: var(--font-body-weight, 400);
      font-size: 20px;
      color: var(--text-muted);
      line-height: 1.6;
      letter-spacing: 0.1px;
      max-width: 480px;
      margin-bottom: 44px;
    }

    /* CTA pill */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent-color);
      color: var(--bg-color);
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 17px 38px;
      border-radius: 100px;
    }

    .cta-arrow {
      font-size: 15px;
      letter-spacing: 0;
      margin-top: 1px;
    }

    /* Brand whisper — bottom-right */
    .brand-whisper {
      position: absolute;
      bottom: 56px;
      right: 88px;
      font-family: var(--font-body), 'Helvetica Neue', Arial, sans-serif;
      font-weight: 700;
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 4px;
      opacity: 0.4;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="bg-solid"></div>
  <div class="noise"></div>

  <div class="logo-mark">{{logo_mark}}</div>

  <div class="stage">
    <div class="knockout-text">{{headline}}</div>
  </div>

  <div class="bottom-panel">
    <div class="accent-line"></div>
    <div class="body-text">{{body}}</div>
    <div class="cta-btn">{{cta}} <span class="cta-arrow">&rarr;</span></div>
  </div>

  <div class="brand-whisper">{{brand_name}}</div>
</body>
</html>
