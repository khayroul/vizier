<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{title}}</title>
  <style>
    @page {
      margin: 2.5cm;
      @bottom-center {
        content: counter(page) " / " counter(pages);
        font-size: 10px;
        color: #888;
      }
    }

    :root {
      --primary:      {{primary_color}};
      --secondary:    {{secondary_color}};
      --accent:       {{accent_color}};
      --font-heading: {{headline_font}};
      --font-body:    {{body_font}};

      /* Fallbacks (used when vars are unset or empty) */
      --primary-fb:      #1a1a2e;
      --secondary-fb:    #16213e;
      --accent-fb:       #e94560;
      --font-heading-fb: Georgia, "Times New Roman", serif;
      --font-body-fb:    "Helvetica Neue", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family:  var(--font-body,    var(--font-body-fb));
      font-size:    16px;
      line-height:  1.65;
      color:        #222;
      background:   #fff;
    }

    /* ── Hero ── */
    .hero {
      background-color: var(--secondary, var(--secondary-fb));
      padding:          48px 40px 40px;
      color:            #fff;
    }

    .hero h1 {
      font-family:  var(--font-heading, var(--font-heading-fb));
      font-size:    31px;
      font-weight:  700;
      line-height:  1.25;
      color:        #fff;
      margin-bottom: 16px;
    }

    .hero .meta {
      font-size:   13px;
      opacity:     0.75;
      letter-spacing: 0.03em;
    }

    .hero .byline { font-weight: 600; }
    .hero .sep    { margin: 0 8px; }

    /* ── Body wrapper ── */
    .content {
      max-width:  680px;
      margin:     0 auto;
      padding:    40px 0 48px;
    }

    /* ── Headings ── */
    h1, h2, h3 {
      font-family: var(--font-heading, var(--font-heading-fb));
      color:       var(--primary, var(--primary-fb));
      margin-top:  32px;
      margin-bottom: 8px;
    }

    h2 { font-size: 25px; line-height: 1.3; }
    h3 { font-size: 20px; line-height: 1.35; }

    /* ── Paragraphs & lists ── */
    p          { margin-bottom: 16px; }
    ul, ol     { margin: 0 0 16px 24px; }
    li         { margin-bottom: 8px; }

    /* ── Pull quote ── */
    blockquote.pull-quote {
      border-left:  4px solid var(--accent, var(--accent-fb));
      background:   #f7f7f9;
      margin:       32px 0;
      padding:      24px 24px 24px 28px;
      font-size:    20px;
      font-style:   italic;
      line-height:  1.5;
      color:        var(--primary, var(--primary-fb));
      page-break-inside: avoid;
    }

    /* Inline pull quote rendered from {{pull_quote}} slot */
    .pull-quote-wrapper { margin: 32px 0; }

    /* ── Divider ── */
    hr {
      border:     none;
      border-top: 1px solid #ddd;
      margin:     32px 0;
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>{{title}}</h1>
    <p class="meta">
      <span class="byline">{{byline}}</span>
      <span class="sep">&middot;</span>
      <span class="date">{{date}}</span>
    </p>
  </div>

  <div class="content">

    <div class="pull-quote-wrapper">
      <blockquote class="pull-quote">{{pull_quote}}</blockquote>
    </div>

    <hr />

    {{body}}

  </div>

</body>
</html>
