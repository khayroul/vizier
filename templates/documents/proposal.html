<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @page {
    margin: 2.5cm;
    @bottom-center {
      content: counter(page) " / " counter(pages);
      font-size: 10px;
      color: #6b7280;
    }
  }

  :root {
    --primary: {{primary_color}};
    --secondary: {{secondary_color}};
    --accent: {{accent_color}};
    --font-heading: {{headline_font}};
    --font-body: {{body_font}};
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body, "Georgia", serif);
    font-size: 16px;
    line-height: 1.6;
    color: #1f2937;
  }

  h1 { font-family: var(--font-heading, "Helvetica Neue", sans-serif); font-size: 31px; color: var(--primary, #1e3a5f); margin-bottom: 16px; }
  h2 { font-family: var(--font-heading, "Helvetica Neue", sans-serif); font-size: 25px; color: var(--primary, #1e3a5f); margin-bottom: 12px; }
  h3 { font-family: var(--font-heading, "Helvetica Neue", sans-serif); font-size: 20px; color: var(--primary, #1e3a5f); margin-bottom: 8px; }
  p  { font-size: 16px; margin-bottom: 16px; }

  /* ── Cover ── */
  .cover {
    page-break-after: always;
    min-height: 90vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 48px 0;
    position: relative;
  }
  .cover-accent-bar {
    position: absolute;
    top: 0; left: -2.5cm;
    width: 8px;
    height: 100%;
    background: var(--accent, #f59e0b);
  }
  .cover-label {
    font-family: var(--font-heading, "Helvetica Neue", sans-serif);
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent, #f59e0b);
    margin-bottom: 16px;
  }
  .cover-client {
    font-size: 20px;
    color: var(--secondary, #4b5563);
    margin-top: 24px;
  }

  /* ── Section shared ── */
  .section {
    page-break-inside: avoid;
    margin-bottom: 40px;
  }
  .section-rule {
    border: none;
    border-top: 2px solid var(--primary, #1e3a5f);
    margin-bottom: 24px;
    opacity: 0.15;
  }

  /* ── Timeline ── */
  .timeline-row {
    display: flex;
    gap: 16px;
    margin-bottom: 8px;
    padding: 8px 0;
    border-bottom: 1px solid #e5e7eb;
  }
  .timeline-phase {
    font-weight: bold;
    min-width: 120px;
    color: var(--primary, #1e3a5f);
  }

  /* ── Pricing table ── */
  table.pricing {
    width: 100%;
    border-collapse: collapse;
    margin-top: 16px;
    font-size: 15px;
  }
  table.pricing thead tr {
    background: var(--primary, #1e3a5f);
    color: #fff;
  }
  table.pricing th, table.pricing td {
    padding: 10px 16px;
    text-align: left;
  }
  table.pricing tbody tr:nth-child(even) { background: #f3f4f6; }
  table.pricing tfoot tr {
    font-weight: bold;
    background: var(--secondary, #e5e7eb);
  }

  /* ── CTA block ── */
  .cta-block {
    background: var(--accent, #f59e0b);
    padding: 32px 40px;
    margin-top: 40px;
    page-break-inside: avoid;
  }
  .cta-block h2 { color: #fff; }
  .cta-block p  { color: #fff; margin-bottom: 0; }
</style>
</head>
<body>

<!-- Cover -->
<div class="cover">
  <div class="cover-accent-bar"></div>
  <p class="cover-label">Business Proposal</p>
  <h1>{{title}}</h1>
  <p class="cover-client">Prepared for: <strong>{{client_name}}</strong></p>
</div>

<!-- Problem -->
<div class="section">
  <h2>The Challenge</h2>
  <hr class="section-rule">
  <p>{{problem}}</p>
</div>

<!-- Solution -->
<div class="section">
  <h2>Our Solution</h2>
  <hr class="section-rule">
  <p>{{solution}}</p>
</div>

<!-- Timeline -->
<div class="section">
  <h2>Timeline</h2>
  <hr class="section-rule">
  {{timeline}}
</div>

<!-- Pricing -->
<div class="section">
  <h2>Investment</h2>
  <hr class="section-rule">
  {{pricing}}
</div>

<!-- CTA -->
<div class="cta-block">
  <h2>Ready to Move Forward?</h2>
  <p>{{cta}}</p>
</div>

</body>
</html>
